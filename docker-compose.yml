services:
  postgres:
    image: postgres:16-alpine
    container_name: wb-trial-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  trends-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wb-trial-trends-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_ADDRESS: ${HTTP_ADDRESS:-:8080}
      HTTP_ADMIN_TOKEN: ${HTTP_ADMIN_TOKEN:?set HTTP_ADMIN_TOKEN in .env}
      HTTP_SERVICE_VERSION: ${HTTP_SERVICE_VERSION:-1.0.0}
      STORAGE_STOPLIST_POSTGRES_DSN: ${STORAGE_STOPLIST_POSTGRES_DSN:?set STORAGE_STOPLIST_POSTGRES_DSN in .env}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
      CONTRACT_SEARCH_EVENT_SCHEMA_PATH: ${CONTRACT_SEARCH_EVENT_SCHEMA_PATH:-docs/schemas/search_event.v1.schema.json}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s

volumes:
  pgdata:
