name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit and contract tests
        run: go test -race ./...

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wb_trial_task
          POSTGRES_USER: wb_app
          POSTGRES_PASSWORD: wb_app_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wb_app -d wb_trial_task"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      TEST_POSTGRES_DSN: postgres://wb_app:wb_app_password@localhost:5432/wb_trial_task?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Wait for postgres
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "postgres is not reachable"
          exit 1

      - name: Run integration tests
        run: go test -tags=integration ./internal/adapters/storage/postgres

  load:
    name: Load benchmark
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run load benchmark
        run: go test -run ^$ -bench BenchmarkGetTopReadHeavy -benchmem ./internal/adapters/httpapi | tee benchmark.txt

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.txt
